services:
  frontend:
    image: ghcr.io/jurbinbot/ug-trade-evaluator-frontend:latest
    ports:
      - "0.0.0.0:8082:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    image: ghcr.io/jurbinbot/ug-trade-evaluator-backend:latest
    ports:
      - "3001:3001"
    volumes:
      - ug-data:/data
    environment:
      - PORT=3001
      - DATA_FILE=/data/settings.json
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

volumes:
  ug-data:
    driver: local
