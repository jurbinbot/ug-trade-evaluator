services:
  frontend:
    image: ghcr.io/jurbinbot/ug-trade-evaluator-frontend:latest
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    image: ghcr.io/jurbinbot/ug-trade-evaluator-backend:latest
    ports:
      - "3001:3001"
    volumes:
      - ug-data:/data
    environment:
      - PORT=3001
      - DATA_FILE=/data/settings.json
    restart: unless-stopped

volumes:
  ug-data:
    driver: local
